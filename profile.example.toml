# Sample talker profile (schema v2).
# One channel: a UDP broadcast interface sending a GPS GGA sentence at 1 Hz.
#
# Copy this file to `profile.toml` and edit it for local testing;
# `profile.toml` is gitignored, so your edits won't be committed.

version = 2
name = "udp-broadcast-gga"

[[channels]]

[channels.interface]
type = "udp"

[channels.interface.mode]
type = "broadcast"
destination = "192.168.1.116:18180"

[[channels.messages]]
interval_ms = 1000

[channels.messages.payload]
type = "nmea"
talker = "GP"
sentence_type = "GGA"
fields = []

[logging]
level = "info"
